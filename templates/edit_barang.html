<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Barang | Sistem Pengajuan Barang Material</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='adminlte/custom.css') }}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    {% include 'material/partials/sidebar_admin.html' %}
    {% include 'material/partials/navbar.html' %}
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid app-shell">
                <h1>Edit Barang</h1>
                <p class="text-muted mb-0">Sistem Pengajuan Barang Material</p>
            </div>
        </section>
        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <form method="post" action="{{ url_for('edit_barang', id_barang=item.id_barang) }}">
                        <div class="card-header">
                            <h3 class="card-title"><i class="fas fa-edit mr-2 text-primary"></i>Perbarui Barang Material</h3>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>Nama Barang</label>
                                <input type="text" name="nama_barang" class="form-control" value="{{ item.nama_barang }}" required>
                            </div>
                            <div class="form-group">
                                <label>Harga</label>
                                <input type="number" name="harga" class="form-control" min="0" step="0.01" value="{{ item.harga }}" required>
                            </div>
                            <div class="form-group">
                                <label>Stok</label>
                                <input type="number" name="stok" class="form-control" min="0" value="{{ item.stok }}" required>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save mr-1"></i> Update
                            </button>
                            <a href="{{ url_for('barang') }}" class="btn btn-secondary">Kembali</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
    <footer class="main-footer text-sm">
        <strong>Sistem Pengajuan Barang Material</strong>
        <span class="float-right d-none d-sm-inline">Material Management System</span>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
