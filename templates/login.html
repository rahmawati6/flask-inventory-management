<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Sistem Pengajuan Barang Material</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='adminlte/custom.css') }}?v=202607132145">
</head>
<body class="modern-login-body login-bg-body">
<main class="login-split login-background-shell">
    <section class="login-left login-art-panel" aria-label="Sistem Pengajuan Barang Material">
    </section>

    <section class="login-right">
        <div class="login-card-modern">
            <div class="login-user-icon login-logo-icon">
                <img src="{{ url_for('static', filename='adminlte/logo-mark.png') }}" alt="Logo">
            </div>
            <h2>Selamat Datang</h2>
            <p class="subtitle">Silakan login terlebih dahulu</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('login') }}">
                <div class="modern-input">
                    <label>Username</label>
                    <div class="input-shell">
                        <i class="far fa-user"></i>
                        <input type="text" name="username" placeholder="Masukkan username" required autofocus>
                    </div>
                </div>
                <div class="modern-input">
                    <label>Password</label>
                    <div class="input-shell">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Masukkan password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-gradient login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i> Login
                </button>
            </form>
            <div class="login-footer">
                &copy; 2025 <strong>Sistem Pengajuan Barang Material</strong>. All rights reserved.
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='adminlte/app-ui.js') }}?v=202607132145"></script>
</body>
</html>
